name: 🛡️ CodeQL 安全掃描與自動修正建議

on:
  push:
    branches:
      - '**'
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  security-events: write
  pull-requests: write

jobs:
  # ── Job 1: CodeQL 分析 ─────────────────────────────────────────
  codeql-analyze:
    name: CodeQL 安全分析
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - csharp
          - javascript

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: ⚙️ 設定 .NET 環境
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: ⚙️ 設定 Node.js 環境
        if: matrix.language == 'javascript'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 初始化 CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality
          config: |
            paths:
              - src
              - frontend/src
            paths-ignore:
              - '**/*.test.*'
              - '**/*.spec.*'
              - '**/node_modules'
              - '**/bin'
              - '**/obj'

      - name: 🏗️ 自動建置 .NET 專案
        if: matrix.language == 'csharp'
        run: dotnet build VMTO.sln

      - name: 🏗️ 安裝前端依賴
        if: matrix.language == 'javascript'
        run: cd frontend && npm ci

      - name: 🔍 執行 CodeQL 分析
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: always

  # ── Job 2: 生成報告並 Commit ───────────────────────────────────
  security-report:
    name: 產生安全報告並 Commit
    runs-on: ubuntu-latest
    needs: codeql-analyze
    if: always()
    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🔎 取得 CodeQL 安全警報
        id: get-alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "▶️ 查詢 GitHub Code Scanning 警報..."

          ALERTS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/code-scanning/alerts?state=open&per_page=50" \
            2>/dev/null || echo "[]")

          ALERT_COUNT=$(echo "$ALERTS" | jq 'length' 2>/dev/null || echo "0")
          echo "alert_count=$ALERT_COUNT" >> $GITHUB_OUTPUT
          echo "$ALERTS" > /tmp/security-alerts.json
          echo "✅ 取得 ${ALERT_COUNT} 個安全警報"

      - name: 🤖 AI 安全問題分析與修正建議
        id: ai-security
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALERT_COUNT="${{ steps.get-alerts.outputs.alert_count }}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

          if [ "$ALERT_COUNT" = "0" ]; then
            cat > /tmp/security-analysis.md << 'REPORT'
          ## 🛡️ 安全掃描結果

          ### ✅ 本次掃描未發現安全漏洞

          > CodeQL 分析完成，未偵測到已知安全問題。

          ### 📋 掃描設定
          - **掃描語言**: C#、JavaScript/TypeScript
          - **掃描規則集**: security-extended + security-and-quality
          - **掃描範圍**: `src/`、`frontend/src/`
          REPORT
          elif [ -n "$OPENAI_API_KEY" ]; then
            ALERTS_SUMMARY=$(cat /tmp/security-alerts.json | jq -r '
              .[:10] | map(
                "警報 #\(.number): \(.rule.description // .rule.id) [\(.rule.severity // "unknown")] - \(.most_recent_instance.location.path // "unknown"):\(.most_recent_instance.location.start_line // 0)"
              ) | join("\n")' 2>/dev/null || echo "無法解析警報資料")

            PROMPT="你是一位資深資安工程師，專注於 C#/.NET 8 和 TypeScript/Vue3 的安全最佳實踐。

          以下是 CodeQL 在 VMTO（VM Transfer Orchestrator）專案中發現的安全問題：

          $ALERTS_SUMMARY

          專案背景：Clean Architecture DDD 專案，包含 ASP.NET Core Minimal API、MassTransit 消費者、EF Core、Redis、MinIO、vSphere/PVE 整合。

          請以**繁體中文**提供：

          ## 🛡️ 安全漏洞分析與修正建議

          ### 🔴 高危險漏洞
          （CRITICAL/HIGH 等級，需立即修正）

          ### 🟡 中等風險漏洞
          （MEDIUM 等級）

          ### 🟢 低風險與建議
          （LOW/NOTE 等級）

          ### 🔧 修正優先順序
          （條列式行動計劃）

          ### 💡 安全強化建議
          （針對 VMTO 架構的特定建議）

          ### 📊 風險評估
          - 整體安全風險：高/中/低
          - 建議修正時限：X 天內"

            RESPONSE=$(curl -s -X POST https://api.openai.com/v1/chat/completions \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              -d "$(jq -n \
                --arg prompt "$PROMPT" \
                '{
                  model: "gpt-4o",
                  messages: [{role: "user", content: $prompt}],
                  max_tokens: 2000,
                  temperature: 0.2
                }')")

            echo "$RESPONSE" | jq -r '.choices[0].message.content // "AI 分析服務暫時無法使用"' > /tmp/security-analysis.md
          else
            cat > /tmp/security-analysis.md << REPORT
          ## 🛡️ 安全掃描結果

          ### ⚠️ 發現 ${ALERT_COUNT} 個待處理安全警報

          > 未設定 OPENAI_API_KEY，AI 分析功能未啟用。
          > 請至 Settings → Secrets and variables → Actions 新增 \`OPENAI_API_KEY\` 以啟用智慧分析。

          請前往 [Security > Code scanning](https://github.com/${{ github.repository }}/security/code-scanning) 查看詳細資訊。
          REPORT
          fi

          echo "analysis_done=true" >> $GITHUB_OUTPUT

      - name: 📝 建立安全報告並 Commit
        if: steps.ai-security.outputs.analysis_done == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA_SHORT="${{ github.sha }}"
          COMMIT_SHA_SHORT="${COMMIT_SHA_SHORT:0:7}"
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          BRANCH="${{ github.ref_name }}"
          AUTHOR=$(git log -1 --pretty=%an)
          COMMIT_MSG=$(git log -1 --pretty=%B | head -1)
          ALERT_COUNT="${{ steps.get-alerts.outputs.alert_count }}"

          REPORT_DIR=".github/security-reports"
          mkdir -p "$REPORT_DIR"
          REPORT_FILE="$REPORT_DIR/security-scan-${COMMIT_SHA_SHORT}.md"

          {
            echo "# 🛡️ CodeQL 安全掃描報告"
            echo ""
            echo "| 項目 | 內容 |"
            echo "|------|------|"
            echo "| **Commit** | \`${COMMIT_SHA_SHORT}\` |"
            echo "| **分支** | \`${BRANCH}\` |"
            echo "| **作者** | ${AUTHOR} |"
            echo "| **原始訊息** | ${COMMIT_MSG} |"
            echo "| **掃描時間** | ${TIMESTAMP} |"
            echo "| **開放警報數** | ${ALERT_COUNT} 個 |"
            echo "| **掃描工具** | GitHub CodeQL v3 |"
            echo ""
            echo "🔗 [查看完整 Security Alerts](https://github.com/${{ github.repository }}/security/code-scanning)"
            echo ""
            echo "---"
            echo ""
            cat /tmp/security-analysis.md
            echo ""
            echo "---"
            echo ""
            echo "> 📌 本報告由 GitHub Actions CodeQL 安全掃描 Workflow 自動產生"
            echo "> 如有誤判，請至 GitHub Security Code Scanning 介面標記為「Not a problem」"
          } > "$REPORT_FILE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$REPORT_FILE"

          if ! git diff --staged --quiet; then
            SEVERITY_EMOJI="✅"
            if [ "$ALERT_COUNT" -gt "0" ] 2>/dev/null; then
              SEVERITY_EMOJI="⚠️"
            fi

            git commit -m "🛡️ [安全掃描] Commit ${COMMIT_SHA_SHORT} CodeQL 掃描報告

          📌 原始 Commit: ${COMMIT_SHA_SHORT}
          👤 作者: ${AUTHOR}
          🌿 分支: ${BRANCH}
          ⏰ 掃描時間: ${TIMESTAMP}
          ${SEVERITY_EMOJI} 發現警報: ${ALERT_COUNT} 個

          本報告由 GitHub Actions CodeQL 安全掃描 Workflow 自動產生。
          掃描涵蓋 C#（src/）與 TypeScript/Vue3（frontend/src/）。

          詳細報告請見: ${REPORT_FILE}
          Security Alerts: https://github.com/${{ github.repository }}/security/code-scanning"

            git push origin HEAD:${BRANCH}
            echo "✅ 安全報告已 commit 至分支 ${BRANCH}"
          fi

      - name: 📊 輸出安全掃描摘要
        if: always()
        run: |
          echo "## 🛡️ CodeQL 安全掃描摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 內容 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 分支 | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 觸發者 | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 開放警報數 | ${{ steps.get-alerts.outputs.alert_count }} 個 |" >> $GITHUB_STEP_SUMMARY
          echo "| 時間 | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [查看 Security Alerts](https://github.com/${{ github.repository }}/security/code-scanning)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f /tmp/security-analysis.md ]; then
            echo "### 安全分析結果" >> $GITHUB_STEP_SUMMARY
            cat /tmp/security-analysis.md >> $GITHUB_STEP_SUMMARY
          fi
