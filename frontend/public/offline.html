<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VMTO 離線模式</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1220;
        color: #e5e7eb;
      }
      .panel {
        width: min(560px, 92vw);
        background: #111827;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 20px;
      }
      h1 { margin-top: 0; }
      p { color: #cbd5e1; }
      .tip {
        margin-top: 12px;
        padding: 10px;
        border-radius: 8px;
        background: #1e293b;
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <h1>目前離線</h1>
      <p>網路中斷時會顯示快取頁面，API 資料可能不是最新。</p>
      <div class="tip">恢復連線後重新整理頁面，即可取得最新任務狀態。</div>
    </section>
  </body>
</html>
